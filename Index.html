<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Portafolio</title>
    </head>
    <body>
        <h1>Patricio Pacheco</h1>
        <p>Estudiate de programacion</p>
        <p>Lugar favorito: Aerodromo Melilla</p>
        <form action="/enviar" method="post"><br>
            <input type="text" name="nombre" /><br>
            <input type="email" name="email" required /><br>
            <input type="password" name="clave" /><br>
            <input type="number" name="edad" min="1" max="120" /><br>
            <textarea name="mensaje"></textarea><br>
            <input type="checkbox" name="suscribir" /><br>
            <button type="submit">Enviar</button>
        </form>
        <table>
            <thead>
                <tr>
                    <th>Horario</th>
                    <th>Lunes</th>
                    <th>Miercoles</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>8:00 - 9:30</td>
                    <td>Programacion</td>
                    <td>Matematicas</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
